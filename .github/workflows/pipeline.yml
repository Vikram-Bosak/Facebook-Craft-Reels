name: Chinese Reels Automated Pipeline

on:
  push:
    branches:
      - master
  schedule:
    # Trigger 6 times a day (every 4 hours)
    # UTC Equivalent: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    name: End-to-End Chinese Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Optional: Prevent concurrent runs of the workflow
    concurrency:
      group: chinese-pipeline
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🚀 Step 1 - Run Chinese Reels Pipeline Orchestrator (src/scheduler.py)
        id: run_scheduler
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          echo "Starting Scheduler Agent..."
          python src/scheduler.py

      - name: 💾 Commit updated files (like history and archive)
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add downloaded_history.txt workspace/processed_history.json || true
          git commit -m "Update download history and logs" || true
          git pull --rebase origin master || true
          git push origin master || true
